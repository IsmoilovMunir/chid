# Production stack — server uses images from GHCR only (no build, no app source).
#
# Deploy:  IMAGE_TAG=<sha> ./scripts/deploy.sh
# Local:   docker compose -f docker-compose.prod.yml -f docker-compose.build.yml --profile tls up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: chid-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chid_mortgage}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - chid

  backend:
    image: ghcr.io/ismoilovmunir/chid-backend:${IMAGE_TAG:?IMAGE_TAG is required}
    container_name: chid-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-chid_mortgage}
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-1296000000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://chid.ru,https://www.chid.ru,https://crm.chid.ru}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME:-Администратор CHID}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/actuator/health | grep -q UP"]
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 5
    networks:
      - chid

  frontend:
    image: ghcr.io/ismoilovmunir/chid-frontend:${IMAGE_TAG:?IMAGE_TAG is required}
    container_name: chid-frontend
    restart: unless-stopped
    networks:
      - chid

  crm:
    image: ghcr.io/ismoilovmunir/chid-crm:${IMAGE_TAG:?IMAGE_TAG is required}
    container_name: chid-crm
    restart: unless-stopped
    networks:
      - chid

  proxy:
    profiles: ["tls"]
    image: nginx:1.27-alpine
    container_name: chid-proxy
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
      - crm
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${SSL_CERTS_DIR:-./certs}:/etc/nginx/certs:ro
    networks:
      - chid

  proxy-local:
    profiles: ["local"]
    image: nginx:1.27-alpine
    container_name: chid-proxy-local
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
      - crm
    ports:
      - "${HTTP_PORT:-8088}:80"
    volumes:
      - ./nginx/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - chid

volumes:
  postgres_data_prod:

networks:
  chid:
    driver: bridge
