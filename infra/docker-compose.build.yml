# Optional overlay for local image builds (developers only — not used on server).
# docker compose -f docker-compose.prod.yml -f docker-compose.build.yml --profile tls up -d --build

services:
  backend:
    image: ghcr.io/ismoilovmunir/chid-backend:local
    build:
      context: ../backend
      dockerfile: Dockerfile

  frontend:
    image: ghcr.io/ismoilovmunir/chid-frontend:local
    build:
      context: ../frontend
      dockerfile: Dockerfile

  crm:
    image: ghcr.io/ismoilovmunir/chid-crm:local
    build:
      context: ../crm
      dockerfile: Dockerfile
      args:
        VITE_PUBLIC_SITE_URL: ${VITE_PUBLIC_SITE_URL:-https://chid.ru}
        VITE_CHID_PHONE: ${VITE_CHID_PHONE:-+7 (000) 000-00-00}
        VITE_CHID_PHONE_HREF: ${VITE_CHID_PHONE_HREF:-+70000000000}
        VITE_CHID_EMAIL: ${VITE_CHID_EMAIL:-info@chid.ru}
