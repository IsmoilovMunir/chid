# Local development — Postgres only
# From repo root:  docker compose up -d
# From infra/:     docker compose -f docker-compose.dev.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: chid-postgres
    environment:
      POSTGRES_DB: chid_mortgage
      POSTGRES_USER: chid
      POSTGRES_PASSWORD: chid
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
