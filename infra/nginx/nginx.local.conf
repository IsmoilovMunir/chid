# HTTP-only reverse proxy for local smoke-test (no TLS).
# Profile: local

upstream chid_backend {
    server backend:8080;
}

upstream chid_frontend {
    server frontend:80;
}

upstream chid_crm {
    server crm:80;
}

server {
    listen 80;
    server_name localhost chid.local;

    client_max_body_size 4m;

    location /api/ {
        proxy_pass http://chid_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /actuator/health {
        proxy_pass http://chid_backend;
    }

    location / {
        proxy_pass http://chid_frontend;
        proxy_set_header Host $host;
    }
}

server {
    listen 80;
    server_name crm.localhost crm.chid.local;

    client_max_body_size 4m;

    location /api/ {
        proxy_pass http://chid_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://chid_crm;
        proxy_set_header Host $host;
    }
}
