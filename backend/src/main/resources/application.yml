spring:
  application:
    name: chid-mortgage
  profiles:
    active: dev
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:chid-mortgage-dev-secret-key-change-in-production-min-32-chars}
    expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:5173,http://localhost:5174,http://localhost:3000,https://crm.chid.ru,https://chid.ru
