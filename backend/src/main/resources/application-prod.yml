spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

server:
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  health:
    probes:
      enabled: true

logging:
  level:
    root: INFO
    com.chid.mortgage: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:1296000000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://chid.ru,https://crm.chid.ru,https://www.chid.ru}
  admin:
    bootstrap-email: ${ADMIN_EMAIL:}
    bootstrap-password: ${ADMIN_PASSWORD:}
    bootstrap-full-name: ${ADMIN_FULL_NAME:Администратор CHID}
