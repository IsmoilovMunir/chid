databaseChangeLog:
  - changeSet:
      id: 001-create-users
      author: chid
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: full_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE

  - changeSet:
      id: 002-create-clients
      author: chid
      changes:
        - createTable:
            tableName: clients
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: full_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: phone
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
              - column:
                  name: source
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: assigned_user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: comment
                  type: VARCHAR(2000)
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
        - addForeignKeyConstraint:
            baseTableName: clients
            baseColumnNames: assigned_user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_clients_assigned_user

  - changeSet:
      id: 003-create-calculations
      author: chid
      changes:
        - createTable:
            tableName: calculations
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: client_id
                  type: BIGINT
              - column:
                  name: created_by_user_id
                  type: BIGINT
              - column:
                  name: mode
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: property_price
                  type: NUMERIC(19, 2)
              - column:
                  name: down_payment
                  type: NUMERIC(19, 2)
              - column:
                  name: loan_amount
                  type: NUMERIC(19, 2)
                  constraints:
                    nullable: false
              - column:
                  name: base_loan_amount
                  type: NUMERIC(19, 2)
              - column:
                  name: discount_amount
                  type: NUMERIC(19, 2)
              - column:
                  name: discount_percent
                  type: NUMERIC(19, 2)
              - column:
                  name: term_months
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: interest_rate
                  type: NUMERIC(8, 4)
                  constraints:
                    nullable: false
              - column:
                  name: payment_type
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: result_monthly_payment
                  type: NUMERIC(19, 2)
              - column:
                  name: result_total_interest
                  type: NUMERIC(19, 2)
              - column:
                  name: result_overpayment
                  type: NUMERIC(19, 2)
              - column:
                  name: schedule_json
                  type: TEXT
              - column:
                  name: title
                  type: VARCHAR(255)
              - column:
                  name: comment
                  type: VARCHAR(500)
              - column:
                  name: public_token
                  type: VARCHAR(64)
                  constraints:
                    unique: true
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: calculations
            baseColumnNames: client_id
            referencedTableName: clients
            referencedColumnNames: id
            constraintName: fk_calculations_client
        - addForeignKeyConstraint:
            baseTableName: calculations
            baseColumnNames: created_by_user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_calculations_created_by

  - changeSet:
      id: 004-create-leads
      author: chid
      changes:
        - createTable:
            tableName: leads
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: phone
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: calculation_id
                  type: BIGINT
              - column:
                  name: consent
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: leads
            baseColumnNames: calculation_id
            referencedTableName: calculations
            referencedColumnNames: id
            constraintName: fk_leads_calculation
