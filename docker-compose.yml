version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: chid-postgres
    environment:
      POSTGRES_DB: chid_mortgage
      POSTGRES_USER: chid
      POSTGRES_PASSWORD: chid
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
