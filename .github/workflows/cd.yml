name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy to server after pushing images
        type: boolean
        default: true
      sync_infra:
        description: Sync infra/ files to server before deploy
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ismoilovmunir

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Image tag
        id: meta
        run: |
          TAG="${GITHUB_SHA::12}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Using IMAGE_TAG=${TAG}"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/chid-backend:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/chid-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/chid-frontend:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/chid-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push CRM
        uses: docker/build-push-action@v6
        with:
          context: ./crm
          push: true
          build-args: |
            VITE_PUBLIC_SITE_URL=https://chid.ru
            VITE_CHID_PHONE=+7 (495) 000-00-00
            VITE_CHID_PHONE_HREF=+74950000000
            VITE_CHID_EMAIL=info@chid.ru
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/chid-crm:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/chid-crm:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy infra to server
    needs: build-and-push
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' && inputs.deploy == true
      || (github.event_name == 'push' && vars.AUTO_DEPLOY == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Sync infra/ to server
        if: github.event_name != 'workflow_dispatch' || inputs.sync_infra == true
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          source: "infra/docker-compose.prod.yml,infra/docker-compose.dev.yml,infra/Makefile,infra/.env.example,infra/nginx/*,infra/scripts/*"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1
          overwrite: true

      - name: Deploy via infra/scripts/deploy.sh
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DEPLOY_PROFILE: tls
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          envs: IMAGE_TAG,GHCR_USER,GHCR_TOKEN,DEPLOY_PROFILE
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh
