name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Compile
        run: mvn -B -DskipTests compile

      - name: Unit tests
        run: >
          mvn -B test
          -Dtest=MortgageCalculatorServiceTest,Dsk1PropertyParserTest,CianPropertyParserTest,SamoletPropertyParserTest
          -Dsurefire.failIfNoSpecifiedTests=false

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build

  crm:
    name: CRM
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: crm/package-lock.json

      - run: npm ci
      - run: npm run build
